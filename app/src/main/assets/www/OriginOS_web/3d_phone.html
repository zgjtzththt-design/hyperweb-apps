<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xiaomi 14 Ultra - Seamless 3D Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --p-width: 320px;
            --p-height: 660px;
            --p-depth: 26px;
            --frame-color: #1a1a1a;
            --screen-radius: 44px;
            --shiny-metal: linear-gradient(90deg, #333 0%, #555 50%, #333 100%);
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a, #000);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 2000px;
            margin: 0;
            touch-action: none;
            flex-direction: column;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
            font-family: system-ui, sans-serif;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .scene {
            width: var(--p-width);
            height: var(--p-height);
            transform-style: preserve-3d;
        }

        .phone {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
        }

        /* الطبقات الأساسية (الساندوتش) */
        .layer {
            position: absolute;
            inset: 0;
            border-radius: var(--screen-radius);
            backface-visibility: visible;
        }

        /* الزجاج الأمامي */
        .front-glass {
            transform: translateZ(calc(var(--p-depth) / 2));
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            overflow: hidden;
        }

        /* الطبقة الداخلية (العمق) لسد الفراغ البصري */
        .internal-filler {
            transform: translateZ(0);
            background: var(--frame-color);
            border-radius: var(--screen-radius);
            box-shadow: 0 0 10px #000;
        }

        /* الزجاج الخلفي */
        .back-glass {
            transform: translateZ(calc(var(--p-depth) / -2)) rotateY(180deg);
            background: #0d0d0d;
            box-shadow: inset 0 0 50px #000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* بناء الإطار الجانبي (المحيط المكتمل) */
        .side-frame {
            position: absolute;
            background: var(--shiny-metal);
            transform-style: preserve-3d;
        }

        /* الجوانب الطويلة */
        .side-v {
            width: var(--p-depth);
            height: calc(100% - (var(--screen-radius) * 2));
            top: var(--screen-radius);
        }
        .left { left: 0; transform: translateX(-50%) rotateY(-90deg); }
        .right { right: 0; transform: translateX(50%) rotateY(90deg); }

        /* الجوانب العرضية */
        .side-h {
            width: calc(100% - (var(--screen-radius) * 2));
            height: var(--p-depth);
            left: var(--screen-radius);
        }
        .top { top: 0; transform: translateY(-50%) rotateX(90deg); }
        .bottom { bottom: 0; transform: translateY(50%) rotateX(-90deg); }

        /* الزوايا المنحنية (تقنية الشرائح المتعددة لسد الفجوات) */
        .corner {
            position: absolute;
            width: calc(var(--screen-radius) * 2);
            height: calc(var(--screen-radius) * 2);
            transform-style: preserve-3d;
        }
        .tl { top: 0; left: 0; }
        .tr { top: 0; right: 0; }
        .bl { bottom: 0; left: 0; }
        .br { bottom: 0; right: 0; }

        /* الشاشة وتأثير اللمعان */
        .display {
            position: absolute;
            inset: 8px;
            background: linear-gradient(160deg, #020617, #0f172a);
            border-radius: calc(var(--screen-radius) - 8px);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gloss {
            position: absolute;
            inset: -100%;
            background: linear-gradient(135deg, 
                rgba(255,255,255,0) 40%, 
                rgba(255,255,255,0.2) 50%, 
                rgba(255,255,255,0) 60%);
            z-index: 20;
            pointer-events: none;
            transition: transform 0.1s linear;
        }

        /* تفاصيل الكاميرا */
        .camera-bump {
            margin-top: 50px;
            width: 230px;
            height: 230px;
            background: #050505;
            border-radius: 50%;
            border: 4px solid #1a1a1a;
            transform: translateZ(14px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 25px;
            gap: 15px;
        }
        .lens { background: radial-gradient(circle at 30% 30%, #111, #000); border-radius: 50%; border: 1px solid #222; }

        /* أزرار وتفاصيل */
        .btn { position: absolute; background: #333; width: 6px; right: -3px; border-radius: 3px; z-index: 30; }
        .pwr { top: 160px; height: 50px; background: #ff4a00; box-shadow: 0 0 10px rgba(255,74,0,0.3); }
        .vlm { top: 230px; height: 90px; }

        /* منفذ الشحن وسبيكر */
        .port-area { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .usb { width: 35px; height: 8px; background: #000; border-radius: 4px; }
        .dots { display: flex; gap: 2px; }
        .dot { width: 3px; height: 3px; background: #000; border-radius: 50%; }

    </style>
</head>
<body>
    <button class="back-btn" onclick="window.parent.close3DPhonePopup()">عودة / Back</button>

    <div class="scene" id="scene">
        <div class="phone" id="phone">
            
            <!-- طبقة الحشو الداخلية لسد أي تسريب بصري -->
            <div class="layer internal-filler" style="height: 100%; width: 100%;"></div>

            <!-- الوجه الأمامي -->
            <div class="layer front-glass">
                <div class="gloss" id="glossFront"></div>
                <div class="display">
                    <div class="text-center">
                        <div class="text-white font-bold text-2xl tracking-tighter">XIAOMI</div>
                        <div class="text-orange-500 text-xs font-mono">14 ULTRA 3D</div>
                    </div>
                </div>
            </div>

            <!-- الوجه الخلفي -->
            <div class="layer back-glass">
                <div class="gloss" id="glossBack"></div>
                <div class="camera-bump">
                    <div class="lens"></div><div class="lens"></div>
                    <div class="lens"></div><div class="lens"></div>
                </div>
                <div class="mt-auto mb-16 text-3xl font-black text-gray-900 tracking-[10px]">XIAOMI</div>
            </div>

            <!-- الإطار الجانبي المكتمل (Sides) -->
            <div class="side-frame side-v left"></div>
            <div class="side-frame side-v right">
                <div class="btn pwr" style="transform: translateZ(0);"></div>
                <div class="btn vlm" style="transform: translateZ(0);"></div>
            </div>
            <div class="side-frame side-h top"></div>
            <div class="side-frame side-h bottom">
                <div class="port-area" style="transform: translateZ(0);">
                    <div class="dots"><div class="dot"></div><div class="dot"></div></div>
                    <div class="usb"></div>
                    <div class="dots"><div class="dot"></div><div class="dot"></div></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const phone = document.getElementById('phone');
        const glossFront = document.getElementById('glossFront');
        const glossBack = document.getElementById('glossBack');
        
        let isDragging = false;
        let lastX, lastY;
        let rX = -15, rY = 15;

        const updateRotation = (dx, dy) => {
            rY += dx * 0.6;
            rX -= dy * 0.6;
            phone.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
            
            // تحريك اللمعان الزجاجي
            const glossX = (rY % 360) * 2;
            const glossY = (rX % 360) * 2;
            glossFront.style.transform = `translate(${glossX}px, ${glossY}px)`;
            glossBack.style.transform = `translate(${-glossX}px, ${-glossY}px)`;
        };

        // أحداث الفأرة
        window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            updateRotation(e.clientX - lastX, e.clientY - lastY);
            lastX = e.clientX; lastY = e.clientY;
        });
        window.addEventListener('mouseup', () => isDragging = false);

        // أحداث اللمس
        window.addEventListener('touchstart', e => {
            isDragging = true;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        });
        window.addEventListener('touchmove', e => {
            if (!isDragging) return;
            updateRotation(e.touches[0].clientX - lastX, e.touches[0].clientY - lastY);
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });
        window.addEventListener('touchend', () => isDragging = false);

        // وضع البداية
        phone.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
    </script>
</body>
</html>
